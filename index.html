<html lang="en">
  <head>

    <meta name="theme-color" content="#085041" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Primary -->
    <meta name="description" content="Find pickup football games near you. Show up and play." />

    <!-- Open Graph (Facebook, Instagram, iMessage, WhatsApp) -->
    <meta property="og:title" content="stado · Find your game" />
    <meta property="og:description" content="Find pickup football games near you. Show up and play." />
    <meta property="og:image" content="https://stado.football/icon-512.png" />
    <meta property="og:url" content="https://stado.football" />

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="stado · Find your game" />
    <meta name="twitter:description" content="Find pickup football games near you. Show up and play." />
    <meta name="twitter:image" content="https://stado.football/icon-512.png" />
    <title>stado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
    <script>
      (function() {
        var ua = navigator.userAgent || '';
        var isInApp = /Instagram|FBAN|FBAV|FB_IAB|TikTok|BytedanceWebview/i.test(ua);
        if (isInApp) {
          // Android: intent link opens Chrome directly
          if (/Android/i.test(ua)) {
            var intentUrl = 'intent://' + location.host + location.pathname + '#Intent;scheme=https;package=com.android.chrome;end';
            window.location.href = intentUrl;
          }
          // iOS: no reliable force-open exists, but this prompts Safari
          else if (/iPhone|iPad/i.test(ua)) {
            window.location.href = location.href.replace(/^https?:\/\//, 'googlechrome://');
            // Fallback after short delay if Chrome isn't installed
            setTimeout(function() {
              window.location.href = location.href;
            }, 500);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
